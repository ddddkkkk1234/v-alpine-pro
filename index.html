<!DOCTYPE html>
<html lang="ko">
<head>

            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINECTI :: CYBER-AI JOINT ANALYSIS</title>
    <meta name="description" content="Next-gen AI sports science platform. Precision joint tracking with cyberpunk diagnostics.">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020205;
            --bg-grid: rgba(0, 243, 255, 0.05);
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-gold: #ffd700;
            --neon-red: #ff3131;
            --neon-green: #0ff0fc;
            --glass-panel: rgba(0, 20, 40, 0.6);
            --font-main: 'Montserrat', sans-serif;
            --font-digit: 'Orbitron', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg-deep);
            background-image: 
                linear-gradient(var(--bg-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            font-family: var(--font-main);
            line-height: 1.6;
            overflow-x: hidden;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            from { background-position: 0 0; }
            to { background-position: 30px 30px; }
        }

        /* Scanline Overlay */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 2000;
            opacity: 0.3;
        }

        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%;
            background: rgba(2, 2, 5, 0.85);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            padding: 1rem 5%;
            display: flex; justify-content: space-between; align-items: center;
        }
        nav .logo { 
            font-family: var(--font-digit); color: var(--neon-blue); font-size: 1.5rem; font-weight: 900;
            text-decoration: none; text-shadow: 0 0 10px var(--neon-blue); letter-spacing: 2px;
        }
        nav .menu { display: flex; gap: 25px; }
        nav .menu a { 
            color: #fff; text-decoration: none; font-size: 0.8rem; font-weight: 700; 
            text-transform: uppercase; transition: 0.3s; font-family: var(--font-digit);
        }
        nav .menu a:hover { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }
        nav .login-btn {
            border: 1px solid var(--neon-blue); padding: 5px 20px; border-radius: 4px;
            background: rgba(0, 243, 255, 0.1);
        }

        .view-section { display: none; padding-top: 80px; }
        .hero-section {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; position: relative;
        }
        .hero-section h1 {
            font-family: var(--font-digit); font-size: 4rem; color: #fff; line-height: 1;
            text-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue);
            margin-bottom: 20px; text-transform: uppercase;
        }
        .hero-section p { font-family: var(--font-mono); font-size: 1.2rem; color: var(--neon-blue); max-width: 700px; margin-bottom: 40px; }

        /* 비디오 박스 종횡비 고정 및 찌그러짐 방지 */
        .app-container {
            display: grid; grid-template-columns: 1.8fr 1fr; gap: 30px;
            width: 100%; max-width: 1600px; margin: 0 auto; padding: 20px;
        }
        .video-box {
            position: relative; background: #000; border: 2px solid var(--neon-blue);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.3);
            border-radius: 5px; overflow: hidden; aspect-ratio: 16 / 9;
            width: 100%;
        }
        
        #input_video, #output_canvas, .canvas-container { 
            position: absolute !important; top: 0; left: 0; 
            width: 100% !important; height: 100% !important; 
            object-fit: cover !important; /* 영상 비율 유지하며 꽉 채우기 */
        }
        #output_canvas { z-index: 5; pointer-events: none; }
        .canvas-container { z-index: 10; } 

        .crosshair { position: absolute; width: 40px; height: 40px; border: 2px solid var(--neon-blue); z-index: 15; pointer-events: none; }
        .ch-tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .ch-tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .ch-bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .ch-br { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        .dashboard {
            background: var(--glass-panel); border: 1px solid var(--neon-blue);
            padding: 25px; border-radius: 5px; display: flex; flex-direction: column; gap: 20px;
            backdrop-filter: blur(10px); height: fit-content;
        }

        .terminal-panel { background: rgba(0,0,0,0.5); border-left: 3px solid var(--neon-blue); padding: 15px; font-family: var(--font-mono); position: relative; }
        .terminal-panel::before { content: ">> SYSTEM_DIAGNOSTICS"; position: absolute; top: -10px; left: 10px; background: var(--bg-deep); font-size: 0.6rem; color: var(--neon-blue); padding: 0 5px; }

        .stat-box { background: rgba(0, 243, 255, 0.05); border: 1px solid rgba(0, 243, 255, 0.1); padding: 15px; position: relative; }
        .stat-box .label { font-size: 0.6rem; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 1px; }
        .stat-box .value { font-family: var(--font-digit); font-size: 2rem; color: #fff; text-shadow: 0 0 10px var(--neon-blue); }

        .btn-cyber {
            background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue);
            padding: 12px; font-family: var(--font-digit); font-weight: 700; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: 0.3s; overflow: hidden; position: relative; width: 100%;
        }
        .btn-cyber:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }

        footer { padding: 40px 5%; border-top: 1px solid var(--neon-blue); background: #000; text-align: center; font-family: var(--font-mono); color: var(--neon-blue); }

        @media (max-width: 1000px) { .app-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav>
        <a href="javascript:void(0)" onclick="showSection('hero')" class="logo">KINECTI_OS</a>
        <div class="menu">
            <a href="javascript:void(0)" onclick="showSection('hero')">HOME</a>
            <a href="javascript:void(0)" onclick="showSection('tool')">ANALYZE</a>
            <a href="javascript:void(0)" onclick="showSection('about')">TECH</a>
            <a href="javascript:void(0)" onclick="showSection('privacy')">PRIVACY</a>
            <a href="javascript:void(0)" onclick="showSection('login')" class="login-btn">CONNECT</a>
        </div>
    </nav>

    <div class="content-wrapper">
        <section id="hero" class="view-section">
            <div class="hero-section">
                <h1 style="animation: glitch 0.3s infinite;">KINECTI</h1>
                <p>[INITIALIZING_NEURAL_TRACKING_INTERFACE...]<br>AI-POWERED KINETIC ANALYSIS SYSTEM FOR ELITE PERFORMANCE.</p>
                <div style="display: flex; gap: 20px;">
                    <button class="btn-cyber" onclick="showSection('tool')" style="width:auto; padding: 15px 40px;">START_INTERFACE</button>
                </div>
            </div>
        </section>

        <section id="tool" class="view-section" style="padding: 100px 5%;">
            <div class="app-container">
                <div class="video-box">
                    <div class="crosshair ch-tl"></div><div class="crosshair ch-tr"></div>
                    <div class="crosshair ch-bl"></div><div class="crosshair ch-br"></div>
                    <video id="input_video" style="display:none;"></video>
                    <canvas id="output_canvas"></canvas>
                    <canvas id="drawing_canvas"></canvas>
                </div>

                <aside class="dashboard">
                    <div class="terminal-panel">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                            <span style="color: var(--neon-pink);">[v0.2_STABLE]</span>
                            <button onclick="setLanguage(currentLang === 'ko' ? 'en' : 'ko')" style="background: none; border: 1px solid var(--neon-blue); color: var(--neon-blue); font-size: 0.6rem; cursor: pointer;">LANG_SWAP</button>
                        </div>
                        <h2 id="ui_title" style="font-family: var(--font-digit); color: #fff;">CORE_ANALYTICS</h2>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <button class="btn-cyber" id="btn_draw" onclick="toggleDrawing()" style="font-size: 0.6rem;">LASER_PEN</button>
                        <button class="btn-cyber" onclick="clearCanvas()" style="font-size: 0.6rem;">WIPE_DATA</button>
                    </div>

                    <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div class="stat-box"><span class="label" id="ui_left_knee">L_KNEE</span><div class="value" id="leftKneeAngle">0°</div></div>
                        <div class="stat-box"><span class="label" id="ui_right_knee">R_KNEE</span><div class="value" id="rightKneeAngle">0°</div></div>
                        <div class="stat-box"><span class="label" id="ui_left_shoulder">L_SHOULDER</span><div class="value" id="leftShoulderAngle">0°</div></div>
                        <div class="stat-box"><span class="label" id="ui_right_shoulder">R_SHOULDER</span><div class="value" id="rightShoulderAngle">0°</div></div>
                    </div>

                    <div class="stat-box" style="text-align: center;">
                        <span class="label" id="ui_injury_risk">THREAT_LEVEL</span>
                        <div id="riskLevel" class="value risk-low">SAFE</div>
                    </div>

                    <div class="control-panel">
                        <button class="btn-cyber" id="upload_video_btn">UPLOAD_DATA_STREAM</button>
                        <input type="file" id="video_upload" accept="video/*" style="display: none;">
                    </div>
                </aside>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <script>
        function showSection(sectionId) {
            document.querySelectorAll('.view-section').forEach(s => s.style.display = 'none');
            const target = document.getElementById(sectionId);
            if (target) { target.style.display = 'block'; window.scrollTo(0, 0); }
            if (sectionId === 'tool') setTimeout(resizeCanvas, 100);
        }

        const i18n = {
            ko: { title: "코어_분석", left_knee: "L_무릎", right_knee: "R_무릎", left_shoulder: "L_어깨", right_shoulder: "R_어깨", injury_risk: "위험_레벨", upload_video: "데이터_스트림_업로드", risk_safe: "안전", risk_warning: "주의", risk_critical: "위험" },
            en: { title: "CORE_ANALYTICS", left_knee: "L_KNEE", right_knee: "R_KNEE", left_shoulder: "L_SHOULDER", right_shoulder: "R_SHOULDER", injury_risk: "THREAT_LEVEL", upload_video: "UPLOAD_DATA_STREAM", risk_safe: "SAFE", risk_warning: "WARNING", risk_critical: "CRITICAL" }
        };

        let currentLang = 'ko';
        let fabricCanvas;

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('ui_title').innerText = i18n[lang].title;
            document.getElementById('ui_left_knee').innerText = i18n[lang].left_knee;
            document.getElementById('ui_right_knee').innerText = i18n[lang].right_knee;
            document.getElementById('ui_left_shoulder').innerText = i18n[lang].left_shoulder;
            document.getElementById('ui_right_shoulder').innerText = i18n[lang].right_shoulder;
            document.getElementById('ui_injury_risk').innerText = i18n[lang].injury_risk;
            document.getElementById('upload_video_btn').innerText = i18n[lang].upload_video;
        }

        function initFabric() {
            fabricCanvas = new fabric.Canvas('drawing_canvas', { isDrawingMode: false });
            fabricCanvas.freeDrawingBrush = new fabric.PencilBrush(fabricCanvas);
            fabricCanvas.freeDrawingBrush.color = '#00f3ff';
            fabricCanvas.freeDrawingBrush.width = 4;
            fabricCanvas.freeDrawingBrush.shadow = new fabric.Shadow({ blur: 15, color: '#00f3ff' });
            resizeCanvas();
        }

        function resizeCanvas() {
            const container = document.querySelector('.video-box');
            if (fabricCanvas && container) {
                fabricCanvas.setWidth(container.clientWidth);
                fabricCanvas.setHeight(container.clientHeight);
            }
        }

        function toggleDrawing() {
            fabricCanvas.isDrawingMode = !fabricCanvas.isDrawingMode;
            document.getElementById('btn_draw').innerText = fabricCanvas.isDrawingMode ? "ACTIVE" : "LASER_PEN";
        }

        function clearCanvas() { fabricCanvas.clear(); }
        window.addEventListener('resize', resizeCanvas);

        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        function calculateAngle(a, b, c) {
            const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
            let angle = Math.abs(radians * 180.0 / Math.PI);
            if (angle > 180.0) angle = 360.0 - angle;
            return Math.round(angle);
        }

        pose.onResults((results) => {
            if (!results.poseLandmarks) return;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#ff00ff', lineWidth: 2});
            drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#00f3ff', lineWidth: 1, radius: 2});
            const lm = results.poseLandmarks;
            const lKA = calculateAngle(lm[23], lm[25], lm[27]);
            const rKA = calculateAngle(lm[24], lm[26], lm[28]);
            const lSA = calculateAngle(lm[23], lm[11], lm[13]);
            const rSA = calculateAngle(lm[24], lm[12], lm[14]);
            document.getElementById('leftKneeAngle').innerText = `${lKA}°`;
            document.getElementById('rightKneeAngle').innerText = `${rKA}°`;
            document.getElementById('leftShoulderAngle').innerText = `${lSA}°`;
            document.getElementById('rightShoulderAngle').innerText = `${rSA}°`;
            let risk = (lKA < 100 || rKA < 100) ? 100 : (lKA < 120 || rKA < 120) ? 50 : 0;
            const rl = document.getElementById('riskLevel');
            rl.innerText = risk === 100 ? i18n[currentLang].risk_critical : risk === 50 ? i18n[currentLang].risk_warning : i18n[currentLang].risk_safe;
            rl.className = `value ${risk === 100 ? "risk-high" : risk === 50 ? "risk-mid" : "risk-low"}`;
            canvasCtx.restore();
        });

        async function processFrame() {
            if (!videoElement.paused && !videoElement.ended) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                await pose.send({image: videoElement});
                requestAnimationFrame(processFrame);
            }
        }

        document.getElementById('upload_video_btn').addEventListener('click', () => document.getElementById('video_upload').click());
        document.getElementById('video_upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                videoElement.src = URL.createObjectURL(file);
                videoElement.play();
                videoElement.onplay = processFrame;
            }
        });

        showSection('hero');
        setLanguage('ko');
        initFabric();
    </script>
</body>
</html>
